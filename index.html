<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBK SAVINGS LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- PREMIUM RESET & VARIABLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        :root {
            --primary-color: #4f46e5;      
            --primary-hover: #4338ca;
            --secondary-color: #0f172a;    
            --bg-color: #f8fafc;           
            --card-bg: #ffffff;
            --text-dark: #1e293b;          
            --text-muted: #64748b;         
            --border-color: #e2e8f0;       
            --danger-color:  #ef4444;      
            --info-color:    #3b82f6;      
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-md: 12px;
            --radius-lg: 24px;
        }

        body {
            background: linear-gradient(135deg, #ffe0b2, #bbdefb); /* Matched to Admin Header */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- FULL SCREEN SECTION VIEW (Removed White Background) --- */
        .container {
            background: transparent;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 35px;
            color: var(--secondary-color);
            font-weight: 800;
            font-size: 34px;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* --- INPUTS --- */
        input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            font-size: 16px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: rgba(30, 41, 59, 0.6);
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.15);
            transform: translateY(-2px);
        }

        /* --- BUTTON & ANIMATIONS --- */
        button {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(79, 70, 229, 0.4);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Internal Button Loader Bar */
        .btn-loader-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            width: 30%;
            display: none;
            border-radius: 4px;
            animation: btnLoadingBar 1s infinite ease-in-out;
        }
        @keyframes btnLoadingBar {
            0% { left: -30%; width: 30%; }
            50% { width: 50%; }
            100% { left: 100%; width: 30%; }
        }

        /* --- ERROR MESSAGE --- */
        .error {
            color: var(--danger-color);
            background-color: rgba(239, 68, 68, 0.1);
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            padding: 14px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(239, 68, 68, 0.2);
            backdrop-filter: blur(10px);
            display: none;
            animation: fadeInDown 0.3s ease;
        }

        /* --- TOP LOADER BAR --- */
        .loader-container { position: fixed; top: 0; left: 0; width: 100%; height: 5px; z-index: 9999; display: none; background: transparent; }
        .loader-bar { height: 100%; width: 30%; background: linear-gradient(90deg, var(--primary-color), var(--info-color)); position: absolute; animation: loading 1s infinite ease-in-out; border-radius: 4px; box-shadow: 0 2px 10px rgba(79, 70, 229, 0.5); }
        @keyframes loading { 0% { left: -30%; width: 30%; } 50% { width: 50%; } 100% { left: 100%; width: 30%; } }
    </style>
</head>
<body>

    <div id="loader" class="loader-container">
        <div class="loader-bar"></div>
    </div>

    <div class="container">
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <input type="tel" id="loginPhone" placeholder="Phone Number" maxlength="10">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="btnLogin">
                <span id="btnText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                <div id="btnBar" class="btn-loader-bar"></div>
            </button>
        </div>

        <p id="message" class="error"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApYK_C_C8CRy8FpIO3tskc1SFl74ID01Y",
            authDomain: "tirupathistore-244af.firebaseapp.com",
            databaseURL: "https://tirupathistore-244af-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tirupathistore-244af",
            storageBucket: "tirupathistore-244af.firebasestorage.app",
            messagingSenderId: "153023171028",
            appId: "1:153023171028:web:b18d29deccf70bcd906e41"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- Auto Redirect if already logged in ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Determine where to go if they visit index.html while logged in
                redirectUser(user.uid);
            }
        });

        const msgBox = document.getElementById('message');
        const loader = document.getElementById('loader');
        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const btnBar = document.getElementById('btnBar');
        
        const getEmail = (phone) => `${phone}@tirupathistore.com`;
        
        const showLoader = () => { 
            loader.style.display = 'block'; 
            msgBox.style.display = 'none'; 
            btnText.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Authenticating...';
            btnBar.style.display = 'block';
            btnLogin.disabled = true;
            btnLogin.style.opacity = '0.85';
        };
        
        const hideLoader = () => { 
            loader.style.display = 'none'; 
            btnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            btnBar.style.display = 'none';
            btnLogin.disabled = false;
            btnLogin.style.opacity = '1';
        };

        const redirectUser = (uid) => {
            get(child(ref(db), `users/${uid}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const role = snapshot.val().role;
                    window.location.href = role === 'admin' ? 'admin.html' : 'user.html';
                } else {
                    hideLoader();
                    msgBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> User data not found.';
                    msgBox.style.display = 'block';
                }
            }).catch((err) => {
                hideLoader();
                // If we are just checking auth state on load, we might not want to show error
            });
        };

        // --- LOGIN LOGIC ---
        document.getElementById('btnLogin').addEventListener('click', () => {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (phone.length !== 10 || isNaN(phone)) {
                msgBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Invalid Phone Number.';
                msgBox.style.display = 'block';
                return;
            }

            showLoader();
            const email = getEmail(phone);

            // 1. Set Persistence (Local Storage)
            // 2. Sign In
            setPersistence(auth, browserLocalPersistence)
                .then(() => {
                    return signInWithEmailAndPassword(auth, email, password);
                })
                .then((userCredential) => {
                    // Success: Redirect handles next step
                    redirectUser(userCredential.user.uid);
                })
                .catch((error) => {
                    hideLoader();
                    msgBox.innerHTML = '<i class="fas fa-times-circle"></i> Invalid Phone Number or Password.';
                    msgBox.style.display = 'block';
                });
        });
    </script>
</body>
</html>
